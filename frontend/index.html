          détecte automatiquement tous vos abonnements récurrents et repère les
          hausses de prix silencieuses, pour comparer, partager ou résilier vos
          abonnements en un clic.
        </p>

        <table>

            <tr><td>Presse &amp; actualités en ligne</td><td>9 € / mois</td><td>Abonnements fantômes</td></tr>
          </tbody>

        <h2>Questions fréquentes sur le suivi d'abonnements</h2>
        <h3>Est-ce vraiment gratuit pour commencer ?</h3>
        <p>Oui. La détection de vos abonnements et le tableau de bord de base sont accessibles sans carte bancaire. Le Premium n'est nécessaire que pour le comparateur d'offres, le partage de frais et les exports avancés.</p>
        <h3>Comment SubSaver accède-t-il à mes données bancaires ?</h3>
        <p>Via Powens, établissement de paiement agréé par l'ACPR dans le respect de la directive européenne DSP2. Vos identifiants bancaires ne transitent jamais par nos serveurs.</p>
        <h3>Quelle est la meilleure application pour suivre ses abonnements ?</h3>
        <p>Une bonne application de suivi d'abonnements doit détecter automatiquement vos prélèvements récurrents depuis votre historique bancaire, sans ressaisie manuelle. SubSaver scanne vos transactions passées, classe chaque abonnement par catégorie et vous alerte dès qu'un prix augmente.</p>
